<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PROVENDA — Nos Points de Vente</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#04060F;color:#E2E8F0;min-height:100vh}

/* HEADER */
.header{padding:20px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(5,10,2,.8);border-bottom:1px solid rgba(22,163,74,.2);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#16A34A,#15803D);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-name{font-weight:800;font-size:18px;color:#E2E8F0}
.header-sub{font-size:12px;color:#94A3B8}

/* CARTE */
#map{height:60vh;width:100%;z-index:1}

/* LISTE */
.liste-section{padding:24px 5%;max-width:1100px;margin:0 auto}
.section-title{font-size:11px;font-weight:700;color:#86EFAC;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.pdv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.pdv-card{background:rgba(14,20,40,.8);border:1px solid rgba(30,45,74,.8);border-radius:12px;padding:18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.pdv-card:hover{transform:translateY(-3px);border-color:rgba(22,163,74,.4)}
.pdv-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.pdv-nom{font-size:15px;font-weight:700;margin-bottom:6px}
.pdv-adresse{font-size:12px;color:#94A3B8;margin-bottom:4px}
.pdv-tel{font-size:12px;color:#94A3B8;margin-bottom:12px}
.pdv-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-maps{background:rgba(22,163,74,.15);border:1px solid rgba(22,163,74,.3);color:#86EFAC;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:'Syne',sans-serif}
.btn-maps:hover{background:rgba(22,163,74,.3)}
.btn-wa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2);color:#25D366;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:'Syne',sans-serif}
.btn-wa:hover{background:rgba(37,211,102,.2)}
.no-gps{font-size:11px;color:#475569;margin-top:8px}
.badge-pdv{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px}
.mon-pos-btn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.mon-pos-btn:hover{background:rgba(59,130,246,.3)}

/* Popup leaflet personnalisé */
.leaflet-popup-content-wrapper{background:#0E1428;border:1px solid rgba(22,163,74,.3);border-radius:10px;color:#E2E8F0;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:#0E1428}
.leaflet-popup-content{font-family:'Syne',sans-serif;font-size:13px;margin:12px 14px}
.leaflet-container{background:#0a0f1e}

/* Footer */
.footer{text-align:center;padding:24px;font-size:12px;color:#475569;border-top:1px solid rgba(30,45,74,.4)}

@media(max-width:600px){
  #map{height:50vh}
  .pdv-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">🌾</div>
    <div>
      <div class="logo-name">PROVENDA</div>
      <div class="header-sub">Nos points de vente</div>
    </div>
  </div>
  <button class="mon-pos-btn" onclick="centrerSurMoi()">📍 Me localiser</button>
</div>

<div id="map"></div>

<div class="liste-section">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div class="section-title">Tous nos points de vente</div>
    <div id="distance-note" style="font-size:11px;color:#94A3B8"></div>
  </div>
  <div class="pdv-grid" id="pdv-grid">
    <div style="color:#94A3B8;font-size:13px">Chargement...</div>
  </div>
</div>

<div class="footer">
  PROVENDA · ATM Farm Village · avifarmer.net
</div>

<script>
// ── CONFIG SUPABASE ──────────────────────────────
// Remplacer par les vraies valeurs au déploiement
const SB_URL = 'https://edvgtxzwpopqflaxbown.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdmd0eHp3cG9wcWZsYXhib3duIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTQ3MDksImV4cCI6MjA5MTY5MDcwOX0.kLbvBJUg91_6yp_MXcf0RrozQ6qB3R7ZOXuMcmiVXoY';

// ── PALETTES COULEUR (même que admin.js) ─────────
const PDV_PALETTES = [
  {bg:'#1e3a5f',border:'#3b82f6',text:'#93c5fd',emoji:'🔵'},
  {bg:'#3b1f5e',border:'#a855f7',text:'#d8b4fe',emoji:'🟣'},
  {bg:'#7c2d12',border:'#f97316',text:'#fdba74',emoji:'🟠'},
  {bg:'#164e2e',border:'#22c55e',text:'#86efac',emoji:'🟢'},
  {bg:'#7f1d1d',border:'#ef4444',text:'#fca5a5',emoji:'🔴'},
  {bg:'#1e3a5f',border:'#06b6d4',text:'#67e8f9',emoji:'🩵'},
  {bg:'#4a1942',border:'#ec4899',text:'#f9a8d4',emoji:'🩷'},
  {bg:'#78350f',border:'#f59e0b',text:'#fde68a',emoji:'🟡'},
  {bg:'#1a3a3a',border:'#14b8a6',text:'#5eead4',emoji:'🩵'},
  {bg:'#1f2937',border:'#6366f1',text:'#a5b4fc',emoji:'🔷'},
];
function pvPalette(nom){
  let hash=0;
  for(let i=0;i<nom.length;i++) hash=(hash*31+nom.charCodeAt(i))>>>0;
  return PDV_PALETTES[hash % PDV_PALETTES.length];
}

// ── CARTE ────────────────────────────────────────
const map = L.map('map').setView([6.2, 1.2], 9);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

let userMarker = null;
let points = [];
let userPos = null;

// ── CHARGER LES PDV ──────────────────────────────
async function chargerPDV(){
  const sb = supabase.createClient(SB_URL, SB_KEY);
  const{data} = await sb.from('gp_points_vente')
    .select('*')
    .not('latitude','is',null)
    .not('longitude','is',null)
    .order('nom');

  points = data || [];
  afficherPDV(points);
}

function afficherPDV(pdvs){
  // Supprimer anciens marqueurs
  map.eachLayer(l=>{if(l instanceof L.Marker)map.removeLayer(l);});

  const bounds = [];

  pdvs.forEach(p=>{
    const pal = pvPalette(p.nom);
    // Marqueur coloré custom
    const icon = L.divIcon({
      html: `<div style="background:${pal.bg};border:2px solid ${pal.border};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.4)">${pal.emoji}</div>`,
      className:'',
      iconSize:[32,32],
      iconAnchor:[16,16],
      popupAnchor:[0,-18]
    });

    const dist = userPos ? calcDist(userPos.lat, userPos.lng, p.latitude, p.longitude) : null;

    const marker = L.marker([p.latitude, p.longitude], {icon})
      .addTo(map)
      .bindPopup(`
        <div style="min-width:180px">
          <div style="font-weight:700;font-size:14px;color:${pal.text};margin-bottom:6px">${pal.emoji} ${p.nom}</div>
          ${p.adresse?`<div style="font-size:11px;color:#94A3B8;margin-bottom:4px">📍 ${p.adresse}</div>`:''}
          ${p.telephone?`<div style="font-size:11px;color:#94A3B8;margin-bottom:4px">📞 ${p.telephone}</div>`:''}
          ${dist?`<div style="font-size:11px;color:#86efac;margin-bottom:8px">🚗 ${dist} km de vous</div>`:''}
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <a href="https://www.google.com/maps?q=${p.latitude},${p.longitude}" target="_blank" style="background:rgba(22,163,74,.2);color:#86efac;padding:4px 10px;border-radius:6px;font-size:11px;text-decoration:none;font-weight:600">🗺️ Maps</a>
            ${p.telephone?`<a href="https://wa.me/228${p.telephone.replace(/[\s\-\+]/g,'').replace(/^00/,'').replace(/^228/,'')}" target="_blank" style="background:rgba(37,211,102,.15);color:#25D366;padding:4px 10px;border-radius:6px;font-size:11px;text-decoration:none;font-weight:600">📲 WhatsApp</a>`:''}
          </div>
        </div>
      `);
    bounds.push([p.latitude, p.longitude]);
  });

  if(bounds.length > 0) map.fitBounds(bounds, {padding:[40,40]});
  renderCartes(pdvs);
}

function renderCartes(pdvs){
  const grid = document.getElementById('pdv-grid');
  if(!pdvs.length){
    grid.innerHTML='<div style="color:#94A3B8;font-size:13px">Aucun point de vente localisé pour le moment.</div>';
    return;
  }

  // Trier par distance si position connue
  let sorted = [...pdvs];
  if(userPos){
    sorted.sort((a,b)=>{
      const da=calcDist(userPos.lat,userPos.lng,a.latitude,a.longitude);
      const db=calcDist(userPos.lat,userPos.lng,b.latitude,b.longitude);
      return da-db;
    });
    document.getElementById('distance-note').textContent='Triés par distance — le plus proche en premier';
  }

  grid.innerHTML = sorted.map(p=>{
    const pal = pvPalette(p.nom);
    const dist = userPos ? calcDist(userPos.lat, userPos.lng, p.latitude, p.longitude) : null;
    const telClean = (p.telephone||'').replace(/[\s\-\+]/g,'').replace(/^00/,'').replace(/^228/,'');
    return `<div class="pdv-card" style="border-left-color:${pal.border}" onclick="zoomSur(${p.latitude},${p.longitude},'${p.nom}')">
      <div class="badge-pdv" style="background:${pal.bg};color:${pal.text};border:1px solid ${pal.border}">${pal.emoji} ${p.nom}</div>
      ${p.adresse?`<div class="pdv-adresse">📍 ${p.adresse}</div>`:''}
      ${p.telephone?`<div class="pdv-tel">📞 ${p.telephone}</div>`:''}
      ${dist?`<div style="font-size:12px;color:#86efac;margin-bottom:10px;font-weight:600">🚗 ${dist} km de vous</div>`:''}
      <div class="pdv-actions">
        <a href="https://www.google.com/maps?q=${p.latitude},${p.longitude}" target="_blank" class="btn-maps" onclick="event.stopPropagation()">🗺️ Itinéraire</a>
        ${p.telephone?`<a href="https://wa.me/228${telClean}" target="_blank" class="btn-wa" onclick="event.stopPropagation()">📲 WhatsApp</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function zoomSur(lat, lng, nom){
  map.flyTo([lat, lng], 15, {duration:1});
  // Ouvrir le popup du marqueur correspondant
  map.eachLayer(l=>{
    if(l instanceof L.Marker){
      const latlng = l.getLatLng();
      if(Math.abs(latlng.lat-lat)<0.001 && Math.abs(latlng.lng-lng)<0.001){
        l.openPopup();
      }
    }
  });
}

// ── GÉOLOCALISATION ──────────────────────────────
function centrerSurMoi(){
  if(!navigator.geolocation){alert('GPS non disponible');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    userPos = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    if(userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([userPos.lat, userPos.lng], {
      icon: L.divIcon({
        html:'<div style="background:#3b82f6;border:3px solid white;width:16px;height:16px;border-radius:50%;box-shadow:0 0 0 4px rgba(59,130,246,.3)"></div>',
        className:'',iconSize:[16,16],iconAnchor:[8,8]
      })
    }).addTo(map).bindPopup('📍 Vous êtes ici').openPopup();
    map.flyTo([userPos.lat, userPos.lng], 12, {duration:1});
    document.getElementById('distance-note').textContent='Calcul des distances...';
    setTimeout(()=>afficherPDV(points), 500);
  }, ()=>alert('Impossible d\'obtenir votre position'));
}

// Distance en km (Haversine)
function calcDist(lat1, lng1, lat2, lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

// Charger
chargerPDV();
</script>
</body>
</html>
